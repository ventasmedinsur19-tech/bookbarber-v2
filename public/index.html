<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BookBarber V2</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root { --primary: #2563eb; --dark: #0f172a; --bg: #f8fafc; --text-muted: #64748b; }
    body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); }
    
    /* NAVEGACIÓN Y MENÚ LATERAL */
    .navbar { background: var(--dark); color: white; padding: 15px; display: flex; align-items: center; position: sticky; top: 0; z-index: 100; }
    .sidebar { position: fixed; top: 0; left: -100%; width: 280px; height: 100%; background: white; z-index: 1000; transition: 0.3s; box-shadow: 5px 0 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
    .sidebar.active { left: 0; }
    .sidebar-header { padding: 20px; background: var(--dark); color: white; font-weight: 800; display: flex; justify-content: space-between; align-items: center; }
    .nav-items { flex-grow: 1; overflow-y: auto; padding: 10px 0; }
    .nav-item { padding: 14px 20px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; color: var(--dark); text-decoration: none; font-weight: 500; cursor: pointer; }
    .nav-item i { margin-right: 15px; width: 20px; text-align: center; color: var(--primary); font-size: 18px; }
    
    /* CONTENEDORES */
    .container { padding: 20px; max-width: 500px; margin: auto; }
    .plan-card { background: white; border-radius: 15px; padding: 20px; border-left: 5px solid #ef4444; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
    .btn-black { background: var(--dark); color: white; border: none; width: 100%; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
    
    /* ESTILOS SUCURSALES */
    .card-suc { background:white; padding:15px; border-radius:12px; margin-bottom:10px; border:1px solid #eee; display: flex; align-items: center; gap: 15px; }
    .img-preview { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; background: #eee; }
    .btn-plus { background: var(--primary); color: white; border: none; width: 50px; height: 50px; border-radius: 50%; font-size: 24px; cursor: pointer; box-shadow: 0 4px 10px rgba(37,99,235,0.3); display: flex; align-items: center; justify-content: center; margin: 10px auto 20px; }
    .extra-notice { font-size: 12px; color: #ef4444; font-weight: bold; margin-bottom: 10px; text-align: center; }
  </style>
</head>
<body>

  <div class="navbar">
    <i class="fas fa-bars" onclick="tMenu()" style="font-size:20px; margin-right:15px; cursor:pointer;"></i>
    <span style="font-weight:700;">BookBarber V2</span>
  </div>

  <div id="menu" class="sidebar">
    <div class="sidebar-header">
      <span>BOOKBARBER V2</span>
      <i class="fas fa-times" onclick="tMenu()" style="cursor:pointer;"></i>
    </div>
    <div class="nav-items">
      <div class="nav-item" onclick="load('sucursales')"><i class="fas fa-store"></i> Mis sucursales</div>
      <div class="nav-item" onclick="load('staff')"><i class="fas fa-users"></i> Staff</div>
      <div class="nav-item" onclick="load('horarios')"><i class="fas fa-clock"></i> Horarios</div>
      <div class="nav-item" onclick="load('servicios')"><i class="fas fa-cut"></i> Servicios</div>
      <div class="nav-item" onclick="load('turnos')"><i class="fas fa-calendar-check"></i> Turnos</div>
      <div class="nav-item" onclick="load('caja')"><i class="fas fa-wallet"></i> Caja y Ranking</div>
      <div class="nav-item" onclick="load('enlaces')"><i class="fas fa-link"></i> Enlaces de reservas</div>
    </div>
  </div>

  <div class="container">
    <div class="plan-card">
      <small style="font-weight:800; color:var(--text-muted);">ESTADO DEL PLAN</small>
      <h3 style="margin:5px 0;">30 Días de Prueba Gratis</h3>
      <button id="btn-pago" class="btn-black" style="background:#ef4444;" onclick="pagar()">Activar Suscripción ($15.000)</button>
    </div>

    <div id="main-content">
      </div>
  </div>

  <script>
    let sucursalesCount = 0;
    const tMenu = () => document.getElementById('menu').classList.toggle('active');
    
    const toBase64 = f => new Promise((res, rej) => {
      const r = new FileReader(); r.readAsDataURL(f); r.onload = () => res(r.result); r.onerror = e => rej(e);
    });

    async function load(view) {
      if(document.getElementById('menu').classList.contains('active')) tMenu();
      const content = document.getElementById('main-content');
      const tk = localStorage.getItem('token') || "user_actual";

      if(view === 'sucursales') {
        const r = await fetch('/api/sucursales?token=' + tk);
        const data = await r.json();
        sucursalesCount = data.length;
        
        // Actualizar precio en el botón de arriba
        const total = 15000 + (Math.max(0, sucursalesCount - 1) * 5000);
        document.getElementById('btn-pago').innerText = `Activar Suscripción ($${total.toLocaleString()})`;

        let html = '<h2>📍 Mis Sucursales</h2>';
        
        // Mostrar lista de existentes
        data.forEach(s => {
          html += `<div class="card-suc">
            <img src="${s.logoUrl || 'https://via.placeholder.com/50'}" class="img-preview">
            <div><b>${s.nombre}</b><br><small>${s.direccion}</small></div>
          </div>`;
        });

        // BOTÓN "+" PARA AÑADIR (Solo si ya existe la principal)
        if(sucursalesCount > 0) {
          html += `<div style="text-align:center; margin-top:20px;">
                    <button class="btn-plus" onclick="toggleForm()">+</button>
                    <p style="font-size:13px; font-weight:bold; color:var(--dark);">Añadir más sucursales</p>
                  </div>`;
        }

        // FORMULARIO (Se muestra siempre si no hay nada, o al dar click al "+")
        html += `<div id="form-container" style="${sucursalesCount > 0 ? 'display:none;' : 'display:block;'} background:white; padding:20px; border-radius:15px; border:2px dashed #cbd5e1; margin-top:10px;">
          <h3 id="form-title">${sucursalesCount === 0 ? 'Configurar Sucursal Principal' : 'Añadir Sucursal Extra'}</h3>
          
          ${sucursalesCount > 0 ? '<p class="extra-notice">(*) Esta sucursal tiene un valor extra de $5.000 mensual.</p>' : '<p style="font-size:12px; color:var(--text-muted); margin-bottom:15px;">Esta es tu sede central incluida en el plan base.</p>'}
          
          <label style="font-size:12px;">Logo (Galería):</label>
          <input id="sl" type="file" accept="image/*">
          
          <input id="sn" placeholder="Nombre (Ej: Sucursal Centro)">
          <input id="sd" placeholder="Dirección Completa">
          
          <label style="font-size:12px;">Foto Local (Galería):</label>
          <input id="sf" type="file" accept="image/*">
          
          <button class="btn-black" style="background:var(--primary); margin-top:10px;" onclick="saveS()">Guardar Sucursal</button>
        </div>`;

        content.innerHTML = html;
      } else {
        content.innerHTML = `<h2>Sección ${view}</h2><p>Contenido de prueba para ${view}.</p>`;
      }
    }

    function toggleForm() {
      const f = document.getElementById('form-container');
      f.style.display = f.style.display === 'none' ? 'block' : 'none';
      f.scrollIntoView({ behavior: 'smooth' });
    }

    async function saveS() {
      const sn = document.getElementById('sn').value;
      const sd = document.getElementById('sd').value;
      const fL = document.getElementById('sl').files[0];
      const fF = document.getElementById('sf').files[0];

      if(!sn || !sd) return alert('Nombre y Dirección son obligatorios');

      const body = {
        token: localStorage.getItem('token') || "user_actual",
        nombre: sn,
        direccion: sd,
        logo: fL ? await toBase64(fL) : "",
        foto: fF ? await toBase64(fF) : ""
      };

      await fetch('/api/sucursales', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body)
      });

      load('sucursales');
    }

    function pagar() {
      const total = 15000 + (Math.max(0, sucursalesCount - 1) * 5000);
      const msj = encodeURIComponent(`Hola, quiero activar mi suscripción de BookBarber. Total mensual: $${total.toLocaleString()}.`);
      window.open(`https://wa.me/3515920795?text=${msj}`, '_blank');
    }

    load('sucursales');
  </script>
</body>
</html>
