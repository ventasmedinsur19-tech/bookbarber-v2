<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookBarber Panel</title>
    <style>
        :root {
            --primary: #2563eb;
            --dark: #0f172a;
            --bg: #f8fafc;
            --text-muted: #64748b;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; }
        .btn-black { background: var(--dark); color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .badge-trial { background: #fee2e2; color: #ef4444; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        label { font-size: 13px; font-weight: 600; color: var(--dark); margin-top: 10px; display: block; }
    </style>
</head>
<body>
    <div class="container" id="app">
        </div>

    <script>
        // Función para convertir archivos a Base64
        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        async function load(view) {
            const app = document.getElementById('app');
            const token = localStorage.getItem('token');
            
            if(view === 'sucursales') {
                const res = await fetch('/api/sucursales?token=' + token);
                const data = await res.json();
                
                let h = `<h1>Mis Sucursales</h1>`;
                
                // Card de Estado del Plan
                h += `<div class="card">
                    <p style="color:var(--text-muted); font-size:12px; margin:0;">ESTADO DEL PLAN</p>
                    <h2 style="margin:5px 0;">30 Días de Prueba Gratis <span class="badge-trial">PROMO</span></h2>
                    <button class="btn-black" style="background:#ef4444;">Activar Suscripción ($${15000 + (data.length > 0 ? (data.length - 1) * 5000 : 0)})</button>
                </div>`;

                // Lista de sucursales actuales
                data.forEach(s => {
                    h += `<div class="card" style="display:flex; align-items:center; gap:15px;">
                        <img src="${s.logoUrl || 'https://via.placeholder.com/50'}" style="width:50px; height:50px; border-radius:10px; object-fit:cover;">
                        <div>
                            <p style="margin:0; font-weight:bold;">${s.nombre}</p>
                            <p style="margin:0; font-size:12px; color:var(--text-muted);">${s.direccion}</p>
                        </div>
                    </div>`;
                });

                // Formulario para nueva sucursal
                h += `<div style="margin-top:20px; background:#fff; padding:20px; border-radius:15px; border:2px dashed #cbd5e1;">
                    <h3 style="margin-top:0">${data.length === 0 ? '+ Configurar Sucursal Principal' : '+ Agregar Sucursal Nueva'}</h3>
                    
                    ${data.length > 0 
                        ? '<p style="font-size:12px; color:#ef4444; font-weight:bold; margin-bottom:15px;">Recuerda: Cada sucursal adicional tiene un costo de $5.000 extra.</p>' 
                        : '<p style="font-size:12px; color:var(--text-muted); margin-bottom:15px;">Esta es tu sede central e incluye el mantenimiento base.</p>'}
                    
                    <label>Logo de la sucursal (desde tu galería):</label>
                    <input id="sl" type="file" accept="image/*">
                    
                    <input id="sn" placeholder="Nombre de la sucursal">
                    <input id="sd" placeholder="Dirección">
                    
                    <label>Foto del local (desde tu galería):</label>
                    <input id="sf" type="file" accept="image/*">
                    
                    <button class="btn-black" style="background:var(--primary); margin-top:10px;" onclick="saveS()">Guardar Sucursal</button>
                </div>`;
                
                app.innerHTML = h;
            }
        }

        async function saveS() {
            const sn = document.getElementById('sn').value;
            const sd = document.getElementById('sd').value;
            const logoFile = document.getElementById('sl').files[0];
            const fotoFile = document.getElementById('sf').files[0];

            if(!sn || !sd) return alert('Nombre y Dirección son obligatorios');

            const body = {
                token: localStorage.getItem('token'),
                nombre: sn,
                direccion: sd,
                logoBase64: logoFile ? await toBase64(logoFile) : "",
                fotoBase64: fotoFile ? await toBase64(fotoFile) : ""
            };

            const res = await fetch('/api/sucursales', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body)
            });

            if(res.ok) load('sucursales');
        }

        // Carga inicial
        load('sucursales');
    </script>
</body>
</html>
