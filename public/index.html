<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BookBarber V2 | MedinSur Dev</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root { --primary: #2563eb; --dark: #0f172a; --bg: #f8fafc; }
    body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: #1e293b; display: flex; flex-direction: column; min-height: 100vh; }
    
    /* NAVBAR */
    .navbar { background: var(--dark); color: white; padding: 15px; display: flex; align-items: center; position: sticky; top: 0; z-index: 100; }
    
    /* SIDEBAR (RESTAURADO) */
    .sidebar { position: fixed; top: 0; left: -100%; width: 280px; height: 100%; background: white; z-index: 1000; transition: 0.3s; box-shadow: 5px 0 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
    .sidebar.active { left: 0; }
    .sidebar-header { padding: 20px; background: var(--dark); color: white; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
    .nav-content { flex-grow: 1; overflow-y: auto; }
    .nav-item { padding: 15px 20px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; cursor: pointer; color: var(--dark); text-decoration: none; font-size: 14px; }
    .nav-item i { margin-right: 15px; width: 20px; text-align: center; color: var(--primary); }
    
    /* FOOTER DEL MENÚ (MEDINSUR DEV) */
    .sidebar-footer { padding: 20px; border-top: 1px solid #f1f5f9; text-align: center; font-size: 12px; }
    .ws-link { color: #10b981; text-decoration: none; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px; }

    /* CONTENEDORES */
    .container { padding: 20px; max-width: 500px; margin: auto; flex-grow: 1; width: 100%; box-sizing: border-box; }
    .plan-card { background: white; border-radius: 15px; padding: 20px; border-left: 5px solid #ef4444; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 25px; }
    
    /* LISTADO Y BOTONES */
    .card-suc { background: white; padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 15px; }
    .img-preview { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; background: #f1f5f9; }
    
    .btn-plus-fixed { background: var(--primary); color: white; border: none; width: 60px; height: 60px; border-radius: 50%; font-size: 30px; cursor: pointer; box-shadow: 0 6px 15px rgba(37,99,235,0.4); display: flex; align-items: center; justify-content: center; margin: 20px auto; }
    
    .form-box { background: white; padding: 20px; border-radius: 15px; border: 2px dashed #cbd5e1; display: none; margin-top: 15px; }
    input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }
    .btn-action { background: var(--primary); color: white; border: none; width: 100%; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    .btn-red { background: #ef4444; }
  </style>
</head>
<body>

  <div class="navbar">
    <i class="fas fa-bars" onclick="tMenu()" style="font-size:20px; margin-right:15px; cursor:pointer;"></i>
    <span style="font-weight:700;">BOOKBARBER V2</span>
  </div>

  <div id="menu" class="sidebar">
    <div class="sidebar-header">
      <span>BOOKBARBER V2</span>
      <i class="fas fa-times" onclick="tMenu()" style="cursor:pointer;"></i>
    </div>
    <div class="nav-content">
      <div class="nav-item" onclick="load('sucursales')"><i class="fas fa-store"></i> Mis sucursales</div>
      <div class="nav-item" onclick="load('staff')"><i class="fas fa-users"></i> Staff</div>
      <div class="nav-item" onclick="load('horarios')"><i class="fas fa-clock"></i> Horarios</div>
      <div class="nav-item" onclick="load('servicios')"><i class="fas fa-cut"></i> Servicios</div>
      <div class="nav-item" onclick="load('turnos')"><i class="fas fa-calendar-check"></i> Turnos</div>
      <div class="nav-item" onclick="load('caja')"><i class="fas fa-wallet"></i> Caja y Ranking</div>
      <div class="nav-item" onclick="load('enlaces')"><i class="fas fa-link"></i> Enlaces de reservas</div>
    </div>
    <div class="sidebar-footer">
      <a href="https://wa.me/3515920795" class="ws-link"><i class="fab fa-whatsapp"></i> Solicita una mejora</a>
      <p style="color: #64748b; margin: 0;">MedinSur Dev © 2026</p>
    </div>
  </div>

  <div class="container">
    <div class="plan-card">
      <small style="font-weight:bold; color:#64748b;">ESTADO DEL PLAN</small>
      <h3 id="plan-info" style="margin:5px 0;">Cargando estado...</h3>
      <button class="btn-action btn-red" onclick="pagar()">Activar Suscripción ($15.000)</button>
    </div>

    <div id="main-view">
        <h2 style="font-size:20px;">📍 Mis Sucursales</h2>
        <div id="lista-suc"></div>
        
        <div style="text-align:center; margin-top:20px;">
            <button class="btn-plus-fixed" onclick="abrirForm()">+</button>
            <p style="font-weight:bold; font-size:14px; color:var(--dark);">Añadir nueva sucursal</p>
        </div>

        <div id="form-suc" class="form-box">
          <h3 id="f-title">Cargando...</h3>
          <p id="f-desc" style="font-size:12px; margin-bottom:15px;"></p>
          <label style="font-size:12px; font-weight:bold;">Logo (Galería):</label>
          <input type="file" id="up-logo" accept="image/*">
          <input id="in-nom" placeholder="Nombre de la sucursal">
          <input id="in-dir" placeholder="Dirección exacta">
          <label style="font-size:12px; font-weight:bold;">Foto Local (Galería):</label>
          <input type="file" id="up-foto" accept="image/*">
          <button class="btn-action" onclick="guardar()">Guardar Sucursal</button>
        </div>
    </div>
  </div>

  <script>
    let totalSedes = 0;
    const tMenu = () => document.getElementById('menu').classList.toggle('active');
    const toB64 = f => new Promise((res, rej) => {
      const r = new FileReader(); r.readAsDataURL(f); r.onload = () => res(r.result); r.onerror = e => rej(e);
    });

    async function load(view) {
      if(document.getElementById('menu').classList.contains('active')) tMenu();
      if(view !== 'sucursales') return;

      const tk = localStorage.getItem('token') || "demo_123";
      try {
        const r = await fetch('/api/sucursales?token=' + tk);
        const data = await r.json();
        totalSedes = data.length;

        document.getElementById('plan-info').innerText = totalSedes === 0 ? "30 Días de Prueba Gratis" : "Suscripción Activa";
        
        const lista = document.getElementById('lista-suc');
        lista.innerHTML = "";
        
        if(totalSedes > 0) {
          data.forEach(s => {
            lista.innerHTML += `
              <div class="card-suc">
                <img src="${s.logoUrl || ''}" class="img-preview" onerror="this.src='https://via.placeholder.com/50'">
                <div><b>${s.nombre}</b><br><small>${s.direccion}</small></div>
              </div>`;
          });
          configForm(false);
        } else {
          configForm(true);
          document.getElementById('form-suc').style.display = "block";
        }
      } catch(e) { console.error("Error cargando", e); }
    }

    function configForm(esP) {
        document.getElementById('f-title').innerText = esP ? "Configurar Sucursal Principal" : "Añadir Sucursal Extra";
        document.getElementById('f-desc').innerText = esP ? "Sede central incluida en el plan base." : "(*) Costo adicional: $5.000 mensual.";
        document.getElementById('f-desc').style.color = esP ? "#64748b" : "#ef4444";
    }

    function abrirForm() {
        const f = document.getElementById('form-suc');
        f.style.display = f.style.display === "block" ? "none" : "block";
        if(f.style.display === "block") f.scrollIntoView({ behavior: 'smooth' });
    }

    async function guardar() {
      const n = document.getElementById('in-nom').value;
      const d = document.getElementById('in-dir').value;
      const l = document.getElementById('up-logo').files[0];
      const f = document.getElementById('up-foto').files[0];

      if(!n || !d) return alert("Completa los campos obligatorios");

      const body = {
        token: localStorage.getItem('token') || "demo_123",
        nombre: n, direccion: d,
        logo: l ? await toB64(l) : "",
        foto: f ? await toB64(f) : ""
      };

      const res = await fetch('/api/sucursales', {
        method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body)
      });

      if(res.ok) {
        document.getElementById('form-suc').style.display = "none";
        load('sucursales');
      }
    }

    function pagar() {
      const monto = 15000 + (Math.max(0, totalSedes - 1) * 5000);
      window.open(`https://wa.me/3515920795?text=Hola%20MedinSur%20Dev,%20quiero%20pagar%20mi%20plan%20de%20$${monto}`, '_blank');
    }

    load('sucursales');
  </script>
</body>
</html>
