<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookBarber V2 | MedinSur Dev</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2563eb; --dark: #0f172a; --bg: #f8fafc; --red: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: #1e293b; display: flex; flex-direction: column; min-height: 100vh; }
        
        .navbar { background: var(--dark); color: white; padding: 15px; display: flex; align-items: center; position: sticky; top: 0; z-index: 100; }
        
        /* SIDEBAR PROFESIONAL */
        .sidebar { position: fixed; top: 0; left: -100%; width: 280px; height: 100%; background: white; z-index: 1000; transition: 0.3s; box-shadow: 5px 0 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .sidebar.active { left: 0; }
        .sidebar-header { padding: 20px; background: var(--dark); color: white; display: flex; justify-content: space-between; align-items: center; }
        .nav-content { flex-grow: 1; overflow-y: auto; }
        .nav-item { padding: 15px 20px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; cursor: pointer; color: var(--dark); text-decoration: none; font-size: 14px; transition: 0.2s; }
        .nav-item:active { background: #f1f5f9; }
        .nav-item i { margin-right: 15px; width: 20px; text-align: center; color: var(--primary); }
        
        .sidebar-footer { padding: 20px; border-top: 1px solid #f1f5f9; text-align: center; }
        .btn-ws { color: #10b981; text-decoration: none; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 13px; margin-bottom: 15px; }
        .btn-logout { width: 100%; padding: 10px; border: 1px solid var(--red); color: var(--red); background: transparent; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* CONTENIDO */
        .container { padding: 20px; max-width: 500px; margin: auto; width: 100%; box-sizing: border-box; }
        .plan-card { background: white; border-radius: 15px; padding: 20px; border-left: 5px solid var(--red); box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 25px; }
        
        /* LISTADO Y BOTÓN + DEBAJO */
        .sucursal-item { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 15px; }
        .img-suc { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; background: #eee; }
        
        .btn-add-circle { background: var(--primary); color: white; border: none; width: 55px; height: 55px; border-radius: 50%; font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; margin: 20px auto 10px; box-shadow: 0 4px 12px rgba(37,99,235,0.3); }

        /* FORMULARIO MEJORADO */
        .form-box { background: white; padding: 20px; border-radius: 15px; border: 2px dashed #cbd5e1; margin-top: 20px; display: none; }
        .form-box.active { display: block; }
        input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; }
        label { font-size: 11px; font-weight: bold; color: #64748b; margin-bottom: 4px; display: block; }
        .btn-main { background: var(--primary); color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 15px; }
    </style>
</head>
<body>

    <div class="navbar">
        <i class="fas fa-bars" onclick="toggleMenu()" style="font-size:20px; margin-right:15px; cursor:pointer;"></i>
        <span style="font-weight:700; letter-spacing: 0.5px;">BOOKBARBER V2</span>
    </div>

    <div id="menu" class="sidebar">
        <div class="sidebar-header">
            <span>PANEL DE CONTROL</span>
            <i class="fas fa-times" onclick="toggleMenu()" style="cursor:pointer;"></i>
        </div>
        <div class="nav-content">
            <div class="nav-item" onclick="loadView('sucursales')"><i class="fas fa-store"></i> Mis sucursales</div>
            <div class="nav-item" onclick="loadView('staff')"><i class="fas fa-users"></i> Staff</div>
            <div class="nav-item" onclick="loadView('horarios')"><i class="fas fa-clock"></i> Horarios</div>
            <div class="nav-item" onclick="loadView('servicios')"><i class="fas fa-cut"></i> Servicios</div>
            <div class="nav-item" onclick="loadView('turnos')"><i class="fas fa-calendar-check"></i> Turnos</div>
            <div class="nav-item" onclick="loadView('caja')"><i class="fas fa-wallet"></i> Caja y Ranking</div>
            <div class="nav-item" onclick="loadView('enlaces')"><i class="fas fa-link"></i> Enlaces de reservas</div>
        </div>
        <div class="sidebar-footer">
            <a href="javascript:void(0)" onclick="wsMejora()" class="btn-ws">
                <i class="fab fa-whatsapp"></i> Solicita una mejora
            </a>
            <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
            <p style="font-size: 10px; color: #94a3b8; margin-top: 15px;">MedinSur Dev © 2026</p>
        </div>
    </div>

    <div class="container">
        <div class="plan-card">
            <small style="font-weight:bold; color:#64748b; font-size: 10px;">ESTADO DEL PLAN</small>
            <h3 id="plan-txt" style="margin:5px 0; font-size: 18px;">Verificando...</h3>
            <button class="btn-main" style="background: var(--red); padding: 10px;" onclick="wsPago()">Activar Suscripción</button>
        </div>

        <h2 style="font-size:18px; margin-bottom:15px;">📍 Mis Sucursales</h2>
        
        <div id="lista-suc"></div>

        <div id="add-trigger" style="text-align:center;">
            <button class="btn-add-circle" onclick="toggleForm()">+</button>
            <p style="font-size: 12px; font-weight: bold; color: var(--dark);">Añadir nueva sucursal</p>
        </div>

        <div id="form-suc" class="form-box">
            <h3 id="f-title" style="margin-top:0; font-size: 16px;">Configurar Sucursal</h3>
            <p id="f-msg" style="font-size: 11px; margin-bottom:15px; line-height: 1.4;"></p>
            
            <label>Logo de sucursal (Galería):</label>
            <input type="file" id="in-logo" accept="image/*">
            
            <input type="text" id="in-nombre" placeholder="Nombre de la sucursal (ej: Sede Central)">
            <input type="text" id="in-dire" placeholder="Dirección completa">
            
            <label>Foto del local (Galería):</label>
            <input type="file" id="in-foto" accept="image/*">
            
            <button class="btn-main" id="btn-save" onclick="execGuardar()">Guardar Sucursal</button>
        </div>
    </div>

    <script>
        const toggleMenu = () => document.getElementById('menu').classList.toggle('active');
        
        // WhatsApp dinámico
        const wsMejora = () => {
            const msg = encodeURIComponent("Hola MedinSur Dev, me gustaría solicitar una mejora o personalización para mi sistema BookBarber.");
            window.open(`https://wa.me/3515920795?text=${msg}`, '_blank');
        };

        const wsPago = () => {
            const msg = encodeURIComponent("Hola, quiero activar mi plan de BookBarber ($15.000 + sucursales extra).");
            window.open(`https://wa.me/3515920795?text=${msg}`, '_blank');
        };

        const logout = () => {
            if(confirm("¿Cerrar sesión?")) {
                localStorage.clear();
                window.location.reload();
            }
        };

        const toggleForm = () => {
            const f = document.getElementById('form-suc');
            f.classList.toggle('active');
            if(f.classList.contains('active')) f.scrollIntoView({ behavior: 'smooth' });
        };

        // Lógica de carga
        async function loadView(v) {
            if(v !== 'sucursales') return;
            const tk = localStorage.getItem('token') || "demo_user";
            
            try {
                const r = await fetch('/api/sucursales?token=' + tk);
                const data = await r.json();
                
                const lista = document.getElementById('lista-suc');
                lista.innerHTML = "";
                
                document.getElementById('plan-txt').innerText = data.length === 0 ? "30 Días de Prueba Gratis" : "Suscripción Activa";

                if(data.length > 0) {
                    data.forEach(s => {
                        lista.innerHTML += `
                            <div class="sucursal-item">
                                <img src="${s.logoUrl || 'https://via.placeholder.com/50'}" class="img-suc">
                                <div><b style="font-size:14px;">${s.nombre}</b><br><small style="color:#64748b;">${s.direccion}</small></div>
                            </div>`;
                    });
                    setFormInfo(false);
                } else {
                    setFormInfo(true);
                    document.getElementById('form-suc').classList.add('active');
                }
            } catch(e) { console.error(e); }
        }

        function setFormInfo(esP) {
            document.getElementById('f-title').innerText = esP ? "Configurar Sucursal Principal" : "Nueva Sucursal Extra";
            document.getElementById('f-msg').innerText = esP ? "Esta es tu sede central e incluye el mantenimiento base de $15.000." : "(*) Esta sucursal es adicional y tiene un costo extra de $5.000 mensual.";
            document.getElementById('f-msg').style.color = esP ? "#64748b" : "var(--red)";
        }

        const toB64 = f => new Promise((res) => {
            const r = new FileReader(); r.onload = () => res(r.result); r.readAsDataURL(f);
        });

        async function execGuardar() {
            const btn = document.getElementById('btn-save');
            const n = document.getElementById('in-nombre').value;
            const d = document.getElementById('in-dire').value;
            const l = document.getElementById('in-logo').files[0];
            const f = document.getElementById('in-foto').files[0];

            if(!n || !d) return alert("El nombre y la dirección son obligatorios.");

            btn.innerText = "Guardando...";
            btn.disabled = true;

            const body = {
                token: localStorage.getItem('token') || "demo_user",
                nombre: n, direccion: d,
                logo: l ? await toB64(l) : "",
                foto: f ? await toB64(f) : ""
            };

            try {
                const res = await fetch('/api/sucursales', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(body)
                });

                if(res.ok) {
                    alert("¡Sucursal guardada con éxito!");
                    document.getElementById('form-suc').classList.remove('active');
                    window.location.reload(); // Recarga para limpiar inputs y ver lista
                } else {
                    alert("Error al guardar. Intenta de nuevo.");
                }
            } catch(e) { alert("Error de conexión"); }
            btn.innerText = "Guardar Sucursal";
            btn.disabled = false;
        }

        loadView('sucursales');
    </script>
</body>
</html>
